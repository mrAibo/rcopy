name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Verify modules
        run: go mod verify

      - name: Run Go tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run Bats tests
        run: bats tests

      - name: Build offline in vendor mode
        env:
          GOPROXY: "off"
          GOSUMDB: "off"
        run: go build -mod=vendor -o dist/rcopy-vendor .

      - name: Build static Linux amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_SHA::7}" -o dist/rcopy-linux-amd64 .

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: rcopy-linux-amd64
          path: |
            dist/rcopy-linux-amd64
            README.md
            LICENSE
            completions/rcopy.bash
          if-no-files-found: error
          retention-days: 14
