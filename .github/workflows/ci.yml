name: CI

on:
  push:
    branches: [main, feat/go-cli]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Verify module
        run: go mod verify
      - name: Unit tests
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Install Bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Bats tests
        run: bats test
      - name: Vendor-only build
        env:
          GOPROXY: off
          GOSUMDB: off
        run: go build -mod=vendor -o dist/rcopy-vendor .
      - name: Static Linux amd64 build
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags='-s -w' -o dist/rcopy-linux-amd64 .
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: rcopy-linux-amd64
          path: dist/rcopy-linux-amd64
          if-no-files-found: error
